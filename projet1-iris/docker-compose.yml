version: '3.9'

services:
  # =========================================================================
  # Backend - API FastAPI
  # =========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iris-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - iris-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    volumes:
      - ./backend:/app
    labels:
      - "com.efrei.description=Prédicteur Iris - API Backend"

  # =========================================================================
  # Frontend - Interface Web (servie par nginx)
  # =========================================================================
  frontend:
    image: nginx:alpine
    container_name: iris-frontend
    ports:
      - "5000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - iris-network
    restart: unless-stopped
    labels:
      - "com.efrei.description=Prédicteur Iris - Interface Frontend"

networks:
  iris-network:
    driver: bridge
