version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: assistant-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - assistant-network

  # Frontend (serveur HTTP simple)
  frontend:
    image: python:3.11-slim
    container_name: assistant-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "8080:8000"
    command: python -m http.server 8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - assistant-network

networks:
  assistant-network:
    driver: bridge
